<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大学祭キーワードラリー</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚩 キーワードラリー</h1>
            <p id="user-name-display"></p>
        </header>

        <!-- スタンプ台 -->
        <div class="stamp-card">
            <div class="stamp" id="s1">1</div>
            <div class="stamp" id="s2">2</div>
            <div class="stamp" id="s3">3</div>
            <div class="stamp" id="s4">4</div>
            <div class="stamp" id="s5">5</div>
            <div class="stamp" id="s6">6</div>
        </div>

        <!-- メッセージエリア -->
        <div id="info-msg">QRコードをスキャンしてね！</div>

        <!-- 文字表示エリア -->
        <div id="word-section" class="hidden">
            <p>この場所の文字：</p>
            <div id="word-display">?</div>
        </div>

        <!-- ゴールエリア -->
        <div id="goal-section" class="hidden">
            <h2>🎉 ALL CLEAR!</h2>
            <p>全ての文字が集まりました！</p>
        </div>

        <button class="reset-btn" onclick="resetGame()">テスト用：最初からやり直す</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
